<!DOCTYPE html>
<html>
<head>
    <meta name="google-site-verification" content="Google4EC09CDBEC00EECBC3EC">
  <title>Leon Ultra Calculator</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .calculator {
            background: rgba(30, 41, 59, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            font-weight: bold; /* BOLD NUMBERS */
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #020617;
            color: #38bdf8;
            outline: none;
            caret-color: #38bdf8; /* blinking cursor */
        }

        button {
            width: 65px;
            height: 65px;
            margin: 5px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #38bdf8;
            color: black;
            transform: scale(1.05);
        }

        .operator {
            background: #0ea5e9;
        }

        .equal {
            background: #22c55e;
        }

        .clear {
            background: #ef4444;
        }

        /* Glow animation */
        .calculator:hover {
            box-shadow: 0 0 60px #38bdf8;
        }

    </style>
</head>

<body>

<div class="calculator">
    <h2>Leon Ultra Calc</h2>

    <!-- Editable input for cursor -->
    <input type="text" id="display" autofocus>

    <br>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="operator" onclick="press('/')">÷</button>

    <br>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="operator" onclick="press('*')">×</button>

    <br>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="operator" onclick="press('-')">−</button>

    <br>

    <button onclick="press('0')">0</button>
    <button class="equal" onclick="calculate()">=</button>
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator" onclick="press('+')">+</button>

</div>

<script>

function press(value) {
    document.getElementById("display").value += value;
}

function calculate() {
    try {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        alert("Error");
    }
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

/* Keyboard support */
document.addEventListener("keydown", function(e) {
    const key = e.key;

    if (!isNaN(key) || "+-*/.".includes(key)) {
        press(key);
    } else if (key === "Enter") {
        calculate();
    } else if (key === "Backspace") {
        let display = document.getElementById("display");
        display.value = display.value.slice(0, -1);
    }
});

</script>

</body>
</html>
